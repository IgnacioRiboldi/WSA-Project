<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Special</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<header>
    <h1>Daily Special</h1>

    <nav>
        <a href="/" class="btn">Home</a>
        <a href="/food" class="btn">Food</a>
        <a href="/drinks" class="btn">Drinks</a>
        <a href="/promotions" class="btn">Promotions</a>
        <a href="/special" class="btn">Daily Special</a>
        <a href="/order" class="btn">Place Order</a>
    </nav>
</header>

<section class="menu">

    <h2>Today's Special</h2>

    <div class="order-item">
        <span class="item-price">€{{ "%.2f"|format(special.price) }}</span>
        <span class="item-name"><b>{{ special.name }}</b></span>
    </div>

    <p class="center">Please ask for the extras at the counter.</p>

</section>

</body>
</html>
