<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Special</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1, h2 { text-align: center; }
        nav { text-align: center; margin-bottom: 20px; }
        nav a.btn { margin: 0 5px; }

        section { max-width: 700px; margin: 0 auto; text-align: center; }

        /* Reutilizamos el mismo estilo */
        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            margin-top: 20px;
        }

        .item-price {
            flex: 0 0 80px;
            font-weight: bold;
        }

        .item-name {
            flex: 1;
            margin: 0 10px;
        }

        .highlight {
            font-size: 1.2em;
            margin: 15px 0;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }

        .btn:hover { background-color: #2980b9; }
    </style>
</head>

<body>

<header>
    <h1>Daily Special</h1>

    <nav>
        <a href="/" class="btn">Home</a>
        <a href="/food" class="btn">Food</a>
        <a href="/drinks" class="btn">Drinks</a>
        <a href="/promotions" class="btn">Promotions</a>
        <a href="/special" class="btn">Daily Special</a>
        <a href="/order" class="btn">Place Order</a>
    </nav>
</header>

<section>
    <p class="highlight">Today is <b>{{ today }}</b></p>

    <h2>Today's Special</h2>

    <div class="order-item">
        <span class="item-price">€{{ "%.2f"|format(special.price) }}</span>
        <span class="item-name"><b>{{ special.name }}</b></span>
    </div>

    <p style="margin-top:20px;">Please ask for the extras at the counter.</p>
</section>

</body>
</html>
