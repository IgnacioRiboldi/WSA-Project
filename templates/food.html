<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Food Menu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1, h2 { text-align: center; }
        nav { text-align: center; margin-bottom: 20px; }
        nav a.btn { margin: 0 5px; }

        section { max-width: 700px; margin: 0 auto; }
        ul { list-style: none; padding: 0; }

        /* Igual que en order */
        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .item-price {
            flex: 0 0 80px;
            font-weight: bold;
        }

        .item-name {
            flex: 1;
            margin: 0 10px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }

        .btn:hover { background-color: #2980b9; }
    </style>
</head>

<body>

<header>
    <h1>Food Menu</h1>

    <nav>
        <a href="/" class="btn">Home</a>
        <a href="/food" class="btn">Food</a>
        <a href="/drinks" class="btn">Drinks</a>
        <a href="/promotions" class="btn">Promotions</a>
        <a href="/special" class="btn">Daily Special</a>
        <a href="/order" class="btn">Place Order</a>
    </nav>

    <p style="text-align:center;">Browse our available food options.</p>
</header>

<section>
    <h2>Available Food</h2>
    <ul>
    {% for food in food_menu %}
        <li class="order-item">
            <span class="item-price">€{{ "%.2f"|format(food.price) }}</span>
            <span class="item-name">{{ food.name }}</span>
        </li>
    {% endfor %}
    </ul>
</section>

</body>
</html>
